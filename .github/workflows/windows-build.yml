name: Windows package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build MSI and NSIS installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # Node 20, GitHub-hosted runner'larda kullanımdan kaldırıldı. SvelteKit
      # bağımlılıkları kilit dosyasından, tekrarlanabilir şekilde kurulur.
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install SvelteKit dependencies
        run: npm ci --prefix frontend

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI 2.11
        shell: pwsh
        run: cargo install tauri-cli --version "^2.11" --locked

      - name: Build Windows installer (per-user NSIS)
        working-directory: src-tauri
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: cargo tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mikro-cari-aktarim-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.sig
